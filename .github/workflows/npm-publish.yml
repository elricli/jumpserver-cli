name: Publish npm package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for example v0.1.0
        required: true
        type: string
      npm-tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install OIDC-capable npm
        run: |
          npm install --global npm@11.17.0
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Check release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          node -e '
            const { readFileSync } = require("node:fs");
            const version = JSON.parse(readFileSync("package.json", "utf8")).version;
            const tag = process.env.RELEASE_TAG.replace(/^v/, "");
            if (tag !== version) {
              throw new Error(`Release tag ${process.env.RELEASE_TAG} does not match package.json version ${version}`);
            }
          '

      - name: Verify package
        run: npm run verify

      - name: Publish to npm
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          INPUT_NPM_TAG: ${{ inputs['npm-tag'] }}
        run: |
          dist_tag="${INPUT_NPM_TAG:-latest}"
          if [ "$EVENT_NAME" = "release" ] && [ "$RELEASE_PRERELEASE" = "true" ]; then
            dist_tag="next"
          fi
          npm publish --provenance --access public --tag "$dist_tag"
